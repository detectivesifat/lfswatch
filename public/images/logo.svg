<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 340" width="300" height="340">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&amp;display=swap');
    </style>
  </defs>

  <!-- Watch band top -->
  <rect x="115" y="20" width="70" height="40" rx="10" ry="10" fill="#02cbf9"/>
  <rect x="127" y="20" width="46" height="14" rx="6" ry="6" fill="#01b0d8"/>

  <!-- Watch case outer (gear-like) -->
  <circle cx="150" cy="138" r="90" fill="#02cbf9"/>

  <!-- Gear teeth -->
  <rect x="144" y="50" width="12" height="22" rx="4" fill="#02cbf9"/>
  <rect x="144" y="204" width="12" height="22" rx="4" fill="#02cbf9"/>
  <rect x="60" y="132" width="22" height="12" rx="4" fill="#02cbf9"/>
  <rect x="218" y="132" width="22" height="12" rx="4" fill="#02cbf9"/>

  <!-- Diagonal gear teeth -->
  <rect x="80" y="68" width="22" height="12" rx="4" fill="#02cbf9" transform="rotate(45 91 74)"/>
  <rect x="198" y="68" width="22" height="12" rx="4" fill="#02cbf9" transform="rotate(-45 209 74)"/>
  <rect x="80" y="192" width="22" height="12" rx="4" fill="#02cbf9" transform="rotate(-45 91 198)"/>
  <rect x="198" y="192" width="22" height="12" rx="4" fill="#02cbf9" transform="rotate(45 209 198)"/>

  <!-- Watch face background -->
  <circle cx="150" cy="138" r="72" fill="white"/>

  <!-- Watch face inner ring -->
  <circle cx="150" cy="138" r="68" fill="none" stroke="#02cbf9" stroke-width="2" opacity="0.3"/>

  <!-- Hour markers -->
  <line x1="150" y1="76" x2="150" y2="86" stroke="#02cbf9" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="190" x2="150" y2="200" stroke="#02cbf9" stroke-width="3" stroke-linecap="round"/>
  <line x1="88" y1="138" x2="98" y2="138" stroke="#02cbf9" stroke-width="3" stroke-linecap="round"/>
  <line x1="202" y1="138" x2="212" y2="138" stroke="#02cbf9" stroke-width="3" stroke-linecap="round"/>
  <line x1="101" y1="101" x2="108" y2="108" stroke="#02cbf9" stroke-width="2" stroke-linecap="round"/>
  <line x1="192" y1="101" x2="199" y2="108" stroke="#02cbf9" stroke-width="2" stroke-linecap="round"/>
  <line x1="101" y1="175" x2="108" y2="168" stroke="#02cbf9" stroke-width="2" stroke-linecap="round"/>
  <line x1="192" y1="175" x2="199" y2="168" stroke="#02cbf9" stroke-width="2" stroke-linecap="round"/>

  <!-- Hour hand -->
  <line x1="150" y1="138" x2="150" y2="105" stroke="#02cbf9" stroke-width="4" stroke-linecap="round"/>

  <!-- Minute hand -->
  <line x1="150" y1="138" x2="170" y2="115" stroke="#58e7e4" stroke-width="3" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="150" cy="138" r="5" fill="#02cbf9"/>

  <!-- Watch band bottom -->
  <rect x="115" y="218" width="70" height="40" rx="10" ry="10" fill="#02cbf9"/>
  <rect x="127" y="244" width="46" height="14" rx="6" ry="6" fill="#01b0d8"/>

  <!-- Brand text "LFS Watch" -->
  <text x="150" y="290" font-family="Nunito, Arial, sans-serif" font-weight="900" font-size="34" fill="#02cbf9" text-anchor="middle" letter-spacing="1">LFS Watch</text>

  <!-- Decorative line -->
  <line x1="90" y1="310" x2="138" y2="310" stroke="#02cbf9" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="150" cy="310" r="3" fill="#02cbf9"/>
  <line x1="162" y1="310" x2="210" y2="310" stroke="#02cbf9" stroke-width="1.5" stroke-linecap="round"/>
</svg>
